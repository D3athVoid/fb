<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connectly</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a class="logo" href="#">Connectly</a>
    <div class="search-pill">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Search Connectly">
    </div>
  </div>

  <nav class="topbar-center" id="topNav">
    <button class="nav-icon is-active" data-nav="home" title="Home">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 11l9-8 9 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v10h14V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="nav-icon" data-nav="friends" title="Friends">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.2" stroke="currentColor" stroke-width="2"/><circle cx="17" cy="9" r="2.6" stroke="currentColor" stroke-width="2"/><path d="M3 19c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M14.5 14c2.5.3 4.5 2.1 4.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="nav-icon" data-nav="watch" title="Watch">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2.5" stroke="currentColor" stroke-width="2"/><path d="M10 10l5 2.5-5 2.5z" fill="currentColor"/></svg>
    </button>
    <button class="nav-icon" data-nav="marketplace" title="Marketplace">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 9l1.5-5h13L20 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="9" width="16" height="11" rx="1.5" stroke="currentColor" stroke-width="2"/><path d="M9 13a3 3 0 006 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="nav-icon" data-nav="groups" title="Groups">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 17l5-5 4 3 5-6 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </nav>

  <div class="topbar-right">
    <button class="icon-btn" title="Menu">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="4" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="4" y="14" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="icon-btn" title="Messenger">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3C6.5 3 2 6.9 2 11.7c0 2.7 1.5 5.1 3.8 6.7V22l3.6-2c.8.2 1.7.3 2.6.3 5.5 0 10-3.9 10-8.6S17.5 3 12 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      <span class="badge" id="messengerBadge">3</span>
    </button>
    <button class="icon-btn" id="notifBtn" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3a5 5 0 00-5 5v3.2c0 .8-.3 1.6-.9 2.2L5 14.5c-.6.6-.2 1.5.6 1.5h12.8c.8 0 1.2-.9.6-1.5l-1.1-1.1a3.2 3.2 0 01-.9-2.2V8a5 5 0 00-5-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9.5 19a2.5 2.5 0 005 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span class="badge" id="notifBadge">5</span>
    </button>
    <button class="avatar-btn" id="profileBtn">
      <span class="avatar avatar-sm" style="--av:#7C5CFF">YO</span>
    </button>
  </div>
</header>

<div class="layout">

  <aside class="sidebar-left">
    <a class="side-item" href="#">
      <span class="avatar avatar-sm" style="--av:#7C5CFF">YO</span>
      <span>You</span>
    </a>
    <a class="side-item" href="#">
      <span class="side-icon" style="--ic:#1877F2">👥</span>
      <span>Friends</span>
    </a>
    <a class="side-item" href="#">
      <span class="side-icon" style="--ic:#F02849">📺</span>
      <span>Watch</span>
    </a>
    <a class="side-item" href="#">
      <span class="side-icon" style="--ic:#45BD62">🛍️</span>
      <span>Marketplace</span>
    </a>
    <a class="side-item" href="#">
      <span class="side-icon" style="--ic:#2EBFA5">🗂️</span>
      <span>Groups</span>
    </a>
    <a class="side-item" href="#">
      <span class="side-icon" style="--ic:#F7B928">🕒</span>
      <span>Memories</span>
    </a>
    <a class="side-item" href="#">
      <span class="side-icon" style="--ic:#A06CD5">🔖</span>
      <span>Saved</span>
    </a>
    <hr class="side-divider">
    <p class="side-heading">Your shortcuts</p>
    <a class="side-item" href="#">
      <span class="avatar avatar-sm" style="--av:#FF6B4A">UI</span>
      <span>UI/UX Designers PH</span>
    </a>
    <a class="side-item" href="#">
      <span class="avatar avatar-sm" style="--av:#2F6FED">DV</span>
      <span>Devs Who Ship</span>
    </a>
  </aside>

  <main class="feed">
    <div class="stories-row" id="storiesRow"></div>

    <div class="composer">
      <div class="composer-top">
        <span class="avatar avatar-sm" style="--av:#7C5CFF">YO</span>
        <textarea id="composerInput" placeholder="What's on your mind?" rows="1"></textarea>
      </div>
      <div class="composer-bottom">
        <button class="composer-action">📷 <span>Photo</span></button>
        <button class="composer-action">😊 <span>Feeling</span></button>
        <button class="composer-action">📍 <span>Check in</span></button>
        <button class="btn btn-primary" id="postBtn">Post</button>
      </div>
    </div>

    <div class="posts" id="postsContainer"></div>
    <p class="feed-end" id="feedEnd" hidden>No posts match your search.</p>
  </main>

  <aside class="sidebar-right">
    <p class="side-heading">Sponsored</p>
    <div class="sponsored-card">
      <div class="sponsored-thumb" style="--g1:#FFD7C2;--g2:#FF8A65"></div>
      <div>
        <p class="sponsored-title">Standing desks, 30% off</p>
        <p class="sponsored-url">deskwork.example</p>
      </div>
    </div>

    <p class="side-heading">Birthdays</p>
    <div class="birthday-card">
      <span class="birthday-icon">🎂</span>
      <p><strong>Mara Llamas</strong> and <strong>1 other</strong> have birthdays today.</p>
    </div>

    <p class="side-heading">Contacts</p>
    <div id="contactsList" class="contacts-list"></div>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
